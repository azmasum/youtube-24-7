name: 24-7-Live
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'
  push:
    branches: [ main ]
jobs:
  live:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Start Stream
        env:
          YT_KEY: ${{ secrets.YT_KEY }}
          VIDEO_URL: ${{ secrets.VIDEO_URL }}
        run: |
          ffmpeg -re -reconnect 1 -reconnect_streamed 1 -reconnect_delay_max 30 -stream_loop -1 -i "$VIDEO_URL" \
          -vf "scale=1280:720:force_original_aspect_ratio=decrease,pad=1280:720:(ow-iw)/2:(oh-ih)/2:color=black,drawbox=x=20:y=20:w=88:h=32:color=red@0.9:t=fill,drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf:text='LIVE':x=32:y=24:fontcolor=white:fontsize=20,drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf:text='%{localtime\\:%d %B %I\\\\\\:%M %p}':x=20:y=680:fontcolor=white:fontsize=18:box=1:boxcolor=black@0.5:boxborderw=6" \
          -c:v libx264 -preset veryfast -maxrate 2500k -bufsize 5000k -g 60 -c:a aac -b:a 128k -ar 44100 -f flv rtmp://a.rtmp.youtube.com/live2/$YT_KEY
