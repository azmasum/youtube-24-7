name: 24-7-Live-Pro-Final
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'
  push:
    branches: [ main ]

jobs:
  live:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Install Tools
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-noto-core

      - name: Select Video by Time (Dhaka)
        id: picker
        env:
          VIDEO_URL: ${{ secrets.VIDEO_URL }}
          MORNING_URL: ${{ secrets.MORNING_URL }}
          DAY_URL: ${{ secrets.DAY_URL }}
          NIGHT_URL: ${{ secrets.NIGHT_URL }}
        run: |
          export TZ='Asia/Dhaka'
          HOUR=$(date +%H)
          echo "Current Hour in Dhaka: $HOUR"
          if [ "$HOUR" -ge 05 ] && [ "$HOUR" -lt 12 ]; then
            PICKED="${MORNING_URL:-$VIDEO_URL}"
            echo "Slot: MORNING"
          elif [ "$HOUR" -ge 12 ] && [ "$HOUR" -lt 18 ]; then
            PICKED="${DAY_URL:-$VIDEO_URL}"
            echo "Slot: DAY"
          elif [ "$HOUR" -ge 18 ] && [ "$HOUR" -lt 22 ]; then
            PICKED="${DAY_URL:-$VIDEO_URL}"
            echo "Slot: EVENING"
          else
            PICKED="${NIGHT_URL:-$VIDEO_URL}"
            echo "Slot: NIGHT"
          fi
          echo "video=$PICKED" >> $GITHUB_OUTPUT

      - name: Start Stream with Loop and Effects
        env:
          YT_KEY: ${{ secrets.YT_KEY }}
          PICKED_URL: ${{ steps.picker.outputs.video }}
          SCROLL_TEXT: ${{ secrets.SCROLL_TEXT }}
          POPUP_TEXT: ${{ secrets.POPUP_TEXT }}
        run: |
          SCROLL="${SCROLL_TEXT:-🔴 LIVE - সাবস্ক্রাইব করুন - Azma Sums Official}"
          POPUP="${POPUP_TEXT:-SUBSCRIBE NOW}"
          FONT_BN="/usr/share/fonts/truetype/noto/NotoSansBengali-Regular.ttf"
          FONT_EN="/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf"

          echo "Now Playing: $PICKED_URL"

          ffmpeg -re -reconnect 1 -reconnect_streamed 1 -reconnect_delay_max 30 \
          -stream_loop -1 -i "$PICKED_URL" \
          -vf "scale=1280:720:force_original_aspect_ratio=decrease,pad=1280:720:(ow-iw)/2:(oh-ih)/2:color=black,format=yuv420p,drawbox=x=20:y=20:w=88:h=32:color=red@0.9:t=fill,drawtext=fontfile=$FONT_EN:text='LIVE':x=32:y=24:fontcolor=white:fontsize=20,drawtext=fontfile=$FONT_BN:text='%{localtime\\:%d %B %I\\\\\\:%M %p}':x=20:y=680:fontcolor=white:fontsize=18:box=1:boxcolor=black@0.6:boxborderw=6,drawtext=fontfile=$FONT_BN:text='$POPUP':x=(w-tw)/2:y=120:fontcolor=white:fontsize=36:box=1:boxcolor=black@0.7:boxborderw=12:alpha='if(lt(mod(t\\,8)\\,1)\\,0\\,if(lt(mod(t\\,8)\\,2)\\,(mod(t\\,8)-1)\\,if(lt(mod(t\\,8)\\,6)\\,1\\,if(lt(mod(t\\,8)\\,7)\\,7-mod(t\\,8)\\,0))))',drawtext=fontfile=$FONT_BN:text='$SCROLL':x=w-mod(t*100\\,w+tw):y=620:fontcolor=yellow:fontsize=26:box=1:boxcolor=black@0.6:boxborderw=8" \
          -c:v libx264 -preset veryfast -maxrate 2500k -bufsize 5000k -g 60 -c:a aac -b:a 128k -ar 44100 -f flv rtmp://a.rtmp.youtube.com/live2/$YT_KEY
