name: 24-7-Live-Pro
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'
  push:
    branches: [ main ]

jobs:
  live:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Install FFmpeg and Bangla Font
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-noto-core

      - name: Start Loop Stream with Effects
        env:
          YT_KEY: ${{ secrets.YT_KEY }}
          VIDEO_URL: ${{ secrets.VIDEO_URL }}
          # এখানে তোমার টেক্সট চেঞ্জ করতে পারবে
          SCROLL_TEXT: ${{ secrets.SCROLL_TEXT }}
          POPUP_TEXT: ${{ secrets.POPUP_TEXT }}
        run: |
          # ডিফল্ট টেক্সট যদি Secret না থাকে
          SCROLL="${SCROLL_TEXT:-🔴 LIVE - সাবস্ক্রাইব করুন - প্রতিদিন নতুন ভিডিও - Azma Sums Official}"
          POPUP="${POPUP_TEXT:-SUBSCRIBE NOW}"

          FONT_BN="/usr/share/fonts/truetype/noto/NotoSansBengali-Regular.ttf"
          FONT_EN="/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf"

          ffmpeg -re -reconnect 1 -reconnect_streamed 1 -reconnect_delay_max 30 \
          -stream_loop -1 -i "$VIDEO_URL" \
          -vf "scale=1280:720:force_original_aspect_ratio=decrease,pad=1280:720:(ow-iw)/2:(oh-ih)/2:color=black,format=yuv420p,
          drawbox=x=20:y=20:w=88:h=32:color=red@0.9:t=fill,
          drawtext=fontfile=$FONT_EN:text='LIVE':x=32:y=24:fontcolor=white:fontsize=20,
          drawtext=fontfile=$FONT_BN:text='%{localtime\\:%d %B %I\\\\\\:%M %p}':x=20:y=680:fontcolor=white:fontsize=18:box=1:boxcolor=black@0.6:boxborderw=6,
          drawtext=fontfile=$FONT_BN:text='$POPUP':x=(w-tw)/2:y=120:fontcolor=white:fontsize=38:box=1:boxcolor=black@0.7:boxborderw=12:alpha='if(lt(mod(t\\,8)\\,1)\\,0\\,if(lt(mod(t\\,8)\\,2)\\,(mod(t\\,8)-1)\\,if(lt(mod(t\\,8)\\,6)\\,1\\,if(lt(mod(t\\,8)\\,7)\\,7-mod(t\\,8)\\,0))))',
          drawtext=fontfile=$FONT_BN:text='$SCROLL':x=w-mod(t*110\\,w+tw):y=620:fontcolor=yellow:fontsize=28:box=1:boxcolor=black@0.6:boxborderw=8:shadowcolor=black:shadowx=2:shadowy=2" \
          -c:v libx264 -preset veryfast -maxrate 2500k -bufsize 5000k -g 60 \
          -c:a aac -b:a 128k -ar 44100 -f flv rtmp://a.rtmp.youtube.com/live2/$YT_KEY
